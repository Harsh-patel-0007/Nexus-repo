<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Agento logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Agento PKM Dashboard logo featuring a stylized A mark with orbiting node and a purple-to-blue wordmark</desc>

  <defs>
    <!-- Purple to blue gradient for the mark -->
    <linearGradient id="grad-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#378ADD"/>
    </linearGradient>
    <!-- Purple to blue for the wordmark -->
    <linearGradient id="grad-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#378ADD"/>
    </linearGradient>
    <!-- Subtle inner glow ring -->
    <linearGradient id="grad-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AFA9EC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#85B7EB" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- ── ICON MARK (centered at 200, 170) ── -->

  <!-- Outer orbital ring (dashed, elegant) -->
  <circle cx="200" cy="170" r="88" fill="none" stroke="url(#grad-ring)" stroke-width="1.5" stroke-dasharray="6 5" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:6px, 5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Background hexagon-ish shield (softened) -->
  <path d="M200 82 L272 120 L272 220 L200 258 L128 220 L128 120 Z" fill="url(#grad-mark)" opacity="0.08" stroke="url(#grad-mark)" stroke-width="1" stroke-opacity="0.3" style="color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.08;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main A shape – bold, geometric, premium -->
  <!-- Left leg -->
  <path d="M162 218 L185 140 L200 108 L215 140 L238 218 Z" fill="none" stroke="url(#grad-mark)" stroke-width="0" style="fill:none;color:rgb(255, 255, 255);stroke-width:0px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Solid A constructed from paths -->
  <!-- Left stroke of A -->
  <path d="M165 218 L195 112" stroke="url(#grad-mark)" stroke-width="17" stroke-linecap="round" fill="none" style="fill:none;color:rgb(255, 255, 255);stroke-width:17px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Right stroke of A -->
  <path d="M235 218 L205 112" stroke="url(#grad-mark)" stroke-width="17" stroke-linecap="round" fill="none" style="fill:none;color:rgb(255, 255, 255);stroke-width:17px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Crossbar of A -->
  <path d="M178 182 L222 182" stroke="url(#grad-mark)" stroke-width="12" stroke-linecap="round" fill="none" style="fill:none;color:rgb(255, 255, 255);stroke-width:12px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Apex dot (knowledge node) -->
  <circle cx="200" cy="107" r="10" fill="url(#grad-mark)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Orbiting node (top-right of ring) — represents connected knowledge -->
  <circle cx="272" cy="108" r="8" fill="url(#grad-mark)" opacity="0.85" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Connector from apex to orbiting node -->
  <path d="M208 100 Q238 88 264 108" stroke="url(#grad-mark)" stroke-width="1.2" stroke-dasharray="4 3" fill="none" opacity="0.6" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.2px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small task-check node bottom-left -->
  <circle cx="135" cy="225" r="5.5" fill="none" stroke="url(#grad-mark)" stroke-width="1.5" opacity="0.6" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M133 225 L135 227 L138 223" stroke="url(#grad-mark)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.3px;stroke-linecap:round;stroke-linejoin:round;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── WORDMARK ── -->

  <!-- "agento" wordmark in gradient, large, elegant weight -->
  <text x="316" y="186" font-family="var(--font-sans), sans-serif" font-size="72" font-weight="500" letter-spacing="-1" fill="url(#grad-word)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif, sans-serif;font-size:72px;font-weight:500;text-anchor:start;dominant-baseline:auto">agento</text>

  <!-- Tagline below wordmark -->
  <text x="318" y="218" font-family="var(--font-sans), sans-serif" font-size="14" font-weight="400" letter-spacing="3.5" fill="#7F77DD" opacity="0.65" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.65;font-family:&quot;Anthropic Sans&quot;, sans-serif, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">KNOWLEDGE DASHBOARD</text>

  <!-- Subtle horizontal rule under tagline -->
  <line x1="318" y1="228" x2="620" y2="228" stroke="url(#grad-word)" stroke-width="0.8" opacity="0.25" style="fill:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>