<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <title>agento - Premium PKM Dashboard Logo</title>
  
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333EA"/>   <stop offset="50%" stop-color="#4F46E5"/>   <stop offset="100%" stop-color="#0284C7"/>  </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowBg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#090510" rx="16" />

  <g stroke="#FFFFFF" opacity="0.03" stroke-width="1">
    <line x1="0" y1="40" x2="500" y2="40" />
    <line x1="0" y1="160" x2="500" y2="160" />
    <line x1="120" y1="0" x2="120" y2="200" />
  </g>

  <circle cx="80" cy="110" r="60" fill="#9333EA" opacity="0.15" filter="url(#glowBg)" />
  <circle cx="160" cy="110" r="70" fill="#0284C7" opacity="0.15" filter="url(#glowBg)" />

  <g transform="translate(15, -5)">
    <circle cx="70" cy="110" r="22" fill="none" stroke="url(#brandGrad)" stroke-width="10" />
    
    <path d="M 92 85 L 92 125 Q 92 142 108 135" fill="none" stroke="url(#brandGrad)" stroke-width="10" stroke-linecap="round" />
    
    <circle cx="70" cy="110" r="5" fill="#0EA5E9" filter="url(#glow)" />
    
    <circle cx="35" cy="75" r="3" fill="#A855F7" opacity="0.8" />
    <circle cx="115" cy="70" r="4" fill="#3B82F6" opacity="0.9" />
    <circle cx="105" cy="92" r="2" fill="#0EA5E9" opacity="0.6" />
  </g>

  <g transform="translate(145, 0)">
    <text x="0" y="125" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">agento</text>
    
    <text x="4" y="150" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="5">WORKSPACE</text>
  </g>
</svg>
